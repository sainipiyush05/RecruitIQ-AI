<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Cyberpunk Gradients -->
    <linearGradient id="cyberCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>
    <linearGradient id="cyberGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FF87" />
      <stop offset="100%" stop-color="#60EFFF" />
    </linearGradient>
    
    <!-- Neon Drop Shadow Filter -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Base Round Badge (Ensures high contrast on any browser theme) -->
  <circle cx="256" cy="256" r="236" fill="#080B0F" stroke="rgba(0, 242, 254, 0.15)" stroke-width="8" />
  
  <!-- Outer Decorative Target Ring -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="url(#cyberCyan)" stroke-width="4" stroke-dasharray="16 8" opacity="0.3" />
  
  <!-- Stylized "IQ" Logo -->
  <g filter="url(#neonGlow)">
    <!-- "I" Stem -->
    <rect x="145" y="170" width="36" height="180" rx="18" fill="url(#cyberCyan)" />
    
    <!-- "I" Glowing Intelligence Node (Dot) -->
    <circle cx="163" cy="110" r="24" fill="url(#cyberGreen)" />
    
    <!-- "Q" Circular Radar Ring -->
    <circle cx="316" cy="260" r="75" fill="none" stroke="url(#cyberCyan)" stroke-width="36" />
    
    <!-- "Q" Search Scanner Tail -->
    <path d="M 369 313 L 420 364" stroke="url(#cyberCyan)" stroke-width="36" stroke-linecap="round" />
    
    <!-- Q-Tail Connection AI Spark (Balanced green dot) -->
    <circle cx="420" cy="364" r="18" fill="url(#cyberGreen)" />
  </g>
</svg>